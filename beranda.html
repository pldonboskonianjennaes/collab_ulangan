<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beranda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c9ff,#92fe9d);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

.container{
width:85%;
max-width:800px;
padding:40px;
text-align:center;
border-radius:25px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(15px);

box-shadow:
0 8px 32px rgba(0,0,0,0.2);

animation:slide 1.5s ease;
}

@keyframes slide{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

font-size:50px;
color:white;
margin-bottom:15px;
text-shadow:2px 2px 10px rgba(0,0,0,.3);

}

p{

font-size:18px;
color:white;
margin-bottom:30px;
line-height:1.6;

}

button{

padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;

cursor:pointer;

background:white;
color:#2575fc;

font-weight:bold;

transition:0.5s;

}

button:hover{

transform:scale(1.1);

background:#2575fc;

color:white;

box-shadow:0 0 30px #ffffff;

}

.circle{

position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.2);

animation:float 8s infinite;
}

.circle:nth-child(1){

width:120px;
height:120px;

top:10%;
left:10%;

}

.circle:nth-child(2){

width:170px;
height:170px;

bottom:10%;
right:10%;

}

.circle:nth-child(3){

width:80px;
height:80px;

top:70%;
left:20%;

}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-30px);
}

100%{
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

<h1>📚 Website Nilai Siswa</h1>

<p>
Selamat datang di website project kolaborasi.<br>
Klik tombol di bawah untuk melihat daftar nilai anggota.
</p>

<a href="nilai.html">
<button>Lihat Nilai →</button>
</a>

</div>

</body>
</html>`
